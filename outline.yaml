deck:
  title: "人定主线，AI 精排——用 Claude Code 做 villa Beamer"
  short_title: "make-slides"
  author: "段宇乐"
  theme: villa
  template: short          # 短报告：[nosection]，左上圈显示每页标题、徽章显示页码、无目录
  audience: "组内同事，已用 Claude Code、懂 beamer 与组会报告；目的是看完能上手这套 make-slides skill"
  math_density: 0          # 概念为主，几乎不出现 display 公式
  target_frames: 9         # 1 封面（自动）+ 8 内容帧

# 短模版：帧标题进左上圈，须 ≤8 汉字。下面 8 帧按放映顺序。
frames:
  - id: pain
    title: "痛点"
    subtitle: "手工精排 beamer 又慢又累"
    layout: text_fig_split
    layout_hint: "左文右图，文字约 55%；右图给一页成品截图，配 caption「skill 的产出」"
    body: |
      手工精排一套组会 beamer，往往**一晚上就没了**：逐页对齐图文、反复编译看溢出、字号留白来回试。

      - 想清楚"讲什么"只占两成精力，**八成耗在排版**
      - 改一张图，整页又得重排

      ==这套 `make-slides` skill 把分工反过来：你定主线，AI 干精排。==

      右图就是它的产出之一 {{fig:teaser}}。
    figures:
      - ref: teaser
        path: imgs/intro-show-qual.png
        source: provided
        intent: "用一页排布整齐的定性结果网格，第一眼展示成品质量"
        must_show: "多行/多列对齐的定性图网格 + villa 版式（标题圈、页脚）"
        width: "1.0"
        status: done

  - id: hybrid
    title: "混合式"
    subtitle: "按要不要和人讨论来分工"
    layout: parallel_blocks
    layout_hint: "左右两个 block（人 / AI），底部旁白一行；左块 block、右块 exampleblock 区分人/机"
    body: |
      按 ==“这一步要不要和人来回讨论”== 切分，而不是一把梭全交给 AI：

      ### 人 · 交互
      **阶段 1 · 大纲设计**：定主旨、重组逻辑、每页讲什么。最难、最需要你，反复对齐。

      ### AI · 确定性扇出
      **阶段 2 找图 / 阶段 3 排版**：目标定死后并发干，每图、每页各一个 agent。

      > 旁白：子 agent 中途无法问你，所以把要讨论的都收在阶段 1。

  - id: contract
    title: "契约"
    subtitle: "两个文件锁住主线"
    layout: parallel_blocks
    layout_hint: "左右两个 block，各讲一个文件的职责；底部旁白一行"
    body: |
      两个文件当**全程脊柱**，后面每个阶段都读它，不靠 agent 猜：

      ### `narrative.md` · 主线
      一句话主旨 / 重组逻辑（≠ 论文目录）/ 关键洞见。==防止 AI 退回照搬原文的流水账。==

      ### `outline.yaml` · 每页内容
      逐帧的标题、正文、**最终公式**、版式、图规格。排版阶段只填、不猜。

      > 旁白：主线写对了，扇出再多 agent 也不跑偏。

  - id: review
    title: "亲眼验收"
    subtitle: "compile → render → 看 → 改"
    layout: text_fig_split
    layout_hint: "左文右图，文字约六成；右图是一个小闭环示意（tikz），不必加 caption"
    body: |
      agent **有视觉**——这是达到手工级的关键。每页都走一个小循环：

      - 写 `frames/<id>.tex`，编译，渲染成 PNG
      - **`Read` 打开图亲眼看**：溢出？图太大？像手排吗？
      - 不满意就改，直到干净

      每个 agent 用==独立 build 目录==、靠 `TEXINPUTS` 找资源，互不冲突；
      又共享同一份 `preamble.tex`，做到 ==“在 harness 里好看，就在成品里好看”==。

      右图就是这个循环 {{fig:loop}}。
    figures:
      - ref: loop
        path: imgs/intro-loop.tikz.tex
        source: tikz
        intent: "排版阶段每页都走的 compile→render→看→改 闭环"
        must_show: "四个环节节点（写 .tex / 编译 / 渲染 PNG / 亲眼看）顺时针相连 + 一条「不满意→改」回到起点的闭环箭头"
        width: "1.0"
        status: todo

  - id: pipeline
    title: "流水线"
    subtitle: "4+1 阶段，一图看全"
    layout: big_figure
    layout_hint: "图占满上方约七成，下面一句话点题；文字主要靠副标题承载，图尽量放大"
    body: |
      {{fig:pipeline}}

      一条线五个阶段：==阶段 1 交互定纲==，1.5 校公式，==阶段 2、3 并发扇出==找图与排版，最后阶段 4 合并终检。
    figures:
      - ref: pipeline
        path: imgs/intro-pipeline.tikz.tex
        source: tikz
        intent: "把 4+1 阶段的流水线画成一张横向流程图，并标出人/AI 的分工"
        must_show: "5 个阶段方框按顺序（1 大纲设计 · 1.5 公式校对 · 2 找图 · 3 逐页排版 · 4 合并终检）+ 用颜色/标签区分『阶段1=人/交互』与『阶段2-3=并发扇出』（扇出可画成多个并列小框）"
        width: "1.0"
        status: todo

  - id: show-typeset
    title: "产出①"
    subtitle: "概念图、稠密公式，都能手工级"
    layout: image_grid
    layout_hint: "左右两张成品截图，各配一行 caption；底部一句总结。截图可加细边框以示「这是一页幻灯片」"
    body: |
      ### tikz 自绘概念图
      {{fig:show_tikz}}

      ### 逐步稠密推导
      {{fig:show_math}}

      ==概念图自己画、逐步公式照排==，都不溢出、像手排。
    figures:
      - ref: show_tikz
        path: imgs/intro-show-tikz.png
        source: provided
        intent: "展示 AI 用 tikz 画的概念/流程图（一页成品）"
        must_show: "带方框与箭头的概念流程图 + villa 版式"
        width: "1.0"
        status: done
      - ref: show_math
        path: imgs/intro-show-math.png
        source: provided
        intent: "展示稠密公式 + 配套几何示意的推导页（一页成品）"
        must_show: "多个 display 公式 + 右侧向量/几何示意图"
        width: "1.0"
        status: done

  - id: show-figures
    title: "产出②"
    subtitle: "数据曲线、AI 插画，一并搞定"
    layout: image_grid
    layout_hint: "左右两张成品截图，各配一行 caption；底部一句总结。截图可加细边框"
    body: |
      ### seaborn 重画的数据曲线
      {{fig:show_curve}}

      ### GPT-Image 生成的插画
      {{fig:show_gptimg}}

      ==拉数据重画的矢量曲线 + AI 生成的示意插画==，风格都贴合主题。
    figures:
      - ref: show_curve
        path: imgs/intro-show-curve.png
        source: provided
        intent: "展示用 seaborn 拉数据重画的实验曲线（一页成品，含两张并排曲线）"
        must_show: "两张并排的 reward 曲线（rollout 带状 + val 折线）+ villa 版式"
        width: "1.0"
        status: done
      - ref: show_gptimg
        path: imgs/intro-show-gptimg.png
        source: provided
        intent: "展示嵌入了 GPT-Image-2 生成插画的一页成品"
        must_show: "一幅彩色设计感插画（对象编辑示意）+ villa 版式"
        width: "1.0"
        status: done

  - id: itself
    title: "它自己"
    subtitle: "这页 deck 就是它做的"
    layout: bullet_points
    layout_hint: "单栏要点；首句加粗点题，末句 alert 收尾，下方自然留白别硬撑"
    body: |
      **这份介绍 deck 本身，就是用这套流程做出来的。**

      你要做的只有：

      - 复制本仓库开新坑
      - 跟 Claude 说"把这篇 / 这个讲一讲"
      - **陪它过一遍大纲**（阶段 1，最值得花时间）
      - 等它扇出找图与排版，收一份 `slides.pdf`

      ==人定主线，AI 精排。==
